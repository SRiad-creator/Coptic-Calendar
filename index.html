<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta name="description"
        content="Printable Coptic Orthodox Calendar for 2026 with feast days, fasting periods, saints, and Coptic dates. Designed for Coptic youth.">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"

    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-title" content="Coptic Calendar">
    <link rel="apple-touch-icon" href="coptic_cross.png">
</head>

<body>
    <div class="screen-header no-print">
        <div class="screen-header-inner">
            <span class="cross-icon">☦</span>
            <h1>Coptic Orthodox Calendar 2026</h1>
            <p>Year of Our Lord 2026 &bull; Coptic Year 1742–1743 AM</p>
            <div class="header-buttons">
                <button id="printBtn" onclick="window.print()">🖨️ Print Calendar</button>
                <a href="coptic_calendar_2026.ics" download="Coptic_Calendar_2026.ics" class="gcal-btn">📅 All Events</a>
            </div>
            <div class="header-buttons ics-split">
                <a href="coptic_feasts.ics" download="Coptic_Feasts.ics" class="gcal-btn gcal-feast">🎄 Feasts</a>
                <a href="coptic_saints.ics" download="Coptic_Saints.ics" class="gcal-btn gcal-saint">☦️ Saints</a>
                <a href="coptic_sundays.ics" download="Coptic_Sundays.ics" class="gcal-btn gcal-sunday">🟢 Sundays</a>
                <a href="coptic_fasts.ics" download="Coptic_Fasts.ics" class="gcal-btn gcal-fast">🐟 Fasts</a>
            </div>
        </div>
    </div>

    <div id="calendar-container"></div>

    <script src="data.js"></script>
    <script src="app.js"></script>
    <script>
        // One-time cache nuke to clear stale service workers
        (function() {
            if ('serviceWorker' in navigator) {
                if (!localStorage.getItem('sw_v38_cleaned')) {
                    // Unregister ALL service workers
                    navigator.serviceWorker.getRegistrations().then(function(regs) {
                        var promises = regs.map(function(r) { return r.unregister(); });
                        return Promise.all(promises);
                    }).then(function() {
                        // Delete all caches
                        return caches.keys().then(function(keys) {
                            return Promise.all(keys.map(function(k) { return caches.delete(k); }));
                        });
                    }).then(function() {
                        localStorage.setItem('sw_v38_cleaned', '1');
                        // Re-register fresh SW and reload
                        navigator.serviceWorker.register('sw.js').then(function() {
                            window.location.reload();
                        });
                    });
                } else {
                    navigator.serviceWorker.register('sw.js');
                }
            }
        })();
    </script>
</body>

</html>
